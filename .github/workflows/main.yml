name: Windows RDP via Ngrok

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
    - name: Setup Ngrok
      run: |
        choco install ngrok -y
        ngrok authtoken 32UsWXPmxbpd9g0itS3zRWaahyy_6kZ2ZeQ4A3GtSFvc3mfWH

    - name: Enable RDP
      run: |
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        net user runneradmin YourPassword123

    - name: Start Ngrok Tunnel
      run: |
        Start-Process -NoNewWindow ngrok "tcp 3389"
        Start-Sleep -Seconds 15
        Invoke-RestMethod http://127.0.0.1:4040/api/tunnels | ConvertTo-Json -Depth 5

    - name: Keep Session Alive
      run: ping -t 127.0.0.1
